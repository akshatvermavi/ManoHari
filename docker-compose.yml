version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: manohari-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: manohari

  redis:
    image: redis:7-alpine
    container_name: manohari-redis
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning

  backend:
    build: ./backend
    container_name: manohari-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/manohari
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ManohariSuperSecretKeyThatIsVeryLong2024
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE: ${TWILIO_PHONE}
      CORS_ORIGINS: http://localhost:3000
      ADMIN_PASSWORD: Admin@Manohari2024!
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: manohari-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
    depends_on:
      - backend

volumes:
  mongo-data:
